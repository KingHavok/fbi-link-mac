name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build:
    name: Build & Release
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, ad-hoc signed, universal)
        run: |
          set -o pipefail
          xcodebuild \
            -project FBILinkMac.xcodeproj \
            -scheme FBILinkMac \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Verify architectures
        run: |
          APP="build/Build/Products/Release/FBILinkMac.app"
          test -d "$APP" || (echo "App bundle missing at $APP" && exit 1)
          lipo -archs "$APP/Contents/MacOS/FBILinkMac"

      - name: Package app into zip
        id: package
        run: |
          APP="build/Build/Products/Release/FBILinkMac.app"
          SHORT_SHA="${GITHUB_SHA::7}"
          ZIP="FBILinkMac-build-${{ github.run_number }}-${SHORT_SHA}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }} (${{ steps.package.outputs.short_sha }})
          files: ${{ steps.package.outputs.zip }}
          prerelease: true
          make_latest: true
          generate_release_notes: true
          body: |
            Automated build from commit `${{ github.sha }}` on `main`.

            > **Note:** this build is ad-hoc signed, not notarised. macOS will block it on first launch.
            >
            > **To run it (macOS Sequoia / Sonoma):**
            > 1. Double-click the app. A dialog will say it can't be opened — click **Done** (don't click *Move to Bin*).
            > 2. Open **System Settings → Privacy & Security** and scroll to the bottom.
            > 3. Next to "FBILinkMac was blocked…" click **Open Anyway** and authenticate.
            > 4. Re-launch the app; the next confirmation sticks.
            >
            > Or strip the quarantine attribute from the Terminal:
            > ```sh
            > xattr -dr com.apple.quarantine /Applications/FBILinkMac.app
            > ```
